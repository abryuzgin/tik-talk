<div class="messages-wrapper" #chatContainer>
  @for (group of groupedMessages(); track group.dateIcon) {
    <div class="date-splitter">
      <span class="date-icon">{{ group.dateIcon }}</span>
    </div>

    @for (message of group.messages; track message.id) {
      <app-chat-workspace-message
        [message]="message"
      ></app-chat-workspace-message>
    }
  }
</div>

<app-message-input
  class="mt16"
  (created)="onSendMessage($event)"
></app-message-input>
