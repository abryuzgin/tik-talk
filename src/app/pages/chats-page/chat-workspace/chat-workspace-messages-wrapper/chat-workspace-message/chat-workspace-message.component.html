@if (message(); as message) {
  <app-avatar-circle
    class="size32"
    [avatarUrl]="message.user?.avatarUrl"
  ></app-avatar-circle>

  <div class="message-container">
    <div class="user-name-time">
    <span class="name medium-text mb8"
    >{{ message.user?.firstName }} {{ message.user?.lastName }}</span
    >
      <span class="time medium-text mb8">{{
          message.createdAt | formatDate : 'time'
        }}</span>
    </div>
    <div class="message-text medium-text">
      {{ message.text }}
    </div>
  </div>
}
